name: release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install pnpm deps
        run: pnpm install

      - name: Build .deb
        run: pnpm build

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/

      - name: Create source tarball
        run: |
          git archive --format=tar.gz -o rsstoat-${GITHUB_REF_NAME#v}.tar.gz HEAD

      - name: GPG sign tarball
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign tarball
        run: |
          gpg --detach-sign --armor rsstoat-${GITHUB_REF_NAME#v}.tar.gz

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: |
            rsstoat-*.tar.gz
            rsstoat-*.tar.gz.asc

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install pnpm deps
        run: pnpm install

      - name: Build .dmg
        run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install pnpm deps
        run: pnpm install

      - name: Build .msi
        run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/

  publish-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install pnpm deps
        run: pnpm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact dirs
        run: |
          mkdir -p bundles
          find dist -type f \( -name '*.deb' -o -name '*.dmg' -o -name '*.msi' -o -name '*.tar.gz' -o -name '*.asc' \) -exec mv {} bundles/ \;

      - name: Import Tauri signing key
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.tauri
          printf '%s' "$TAURI_PRIVATE_KEY" > ~/.tauri/rsstoat.key

      - name: Generate updater manifest
        id: updater
        env:
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          export TAURI_SIGNING_PRIVATE_KEY_PATH="$HOME/.tauri/rsstoat.key"
          export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$TAURI_KEY_PASSWORD"

          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES="rsStoat $VERSION"

          DEB=$(find bundles -name '*.deb' | head -1)
          DEB_NAME=$(basename "$DEB")
          DMG_X64=$(find bundles -name '*x64.dmg' | head -1)
          DMG_X64_NAME=$(basename "$DMG_X64")
          DMG_AARCH64=$(find bundles -name '*aarch64.dmg' | head -1)
          DMG_AARCH64_NAME=$(basename "$DMG_AARCH64")
          MSI=$(find bundles -name '*.msi' | head -1)
          MSI_NAME=$(basename "$MSI")

          RELEASE_BASE="https://github.com/hisoka-root/rsstoat/releases/download/${GITHUB_REF_NAME}"

          # Sign each bundle with Tauri updater key
          DEB_SIG=""
          DMG_X64_SIG=""
          DMG_AARCH64_SIG=""
          MSI_SIG=""

          sign_bundle() {
            pnpm tauri signer sign "$1" 2>/dev/null \
              | grep -E '^[A-Za-z0-9+/=]{150,}$'
          }

          if [ -n "$DEB" ]; then
            DEB_SIG=$(sign_bundle "$DEB")
          fi
          if [ -n "$DMG_X64" ]; then
            DMG_X64_SIG=$(sign_bundle "$DMG_X64")
          fi
          if [ -n "$DMG_AARCH64" ]; then
            DMG_AARCH64_SIG=$(sign_bundle "$DMG_AARCH64")
          fi
          if [ -n "$MSI" ]; then
            MSI_SIG=$(sign_bundle "$MSI")
          fi

          # Build updater.json
          PLATFORMS="{"
          if [ -n "$DEB" ]; then
            PLATFORMS+="\"linux-x86_64\":{\"signature\":\"$DEB_SIG\",\"url\":\"$RELEASE_BASE/$DEB_NAME\"}"
          fi
          if [ -n "$DMG_X64" ]; then
            [ "$PLATFORMS" != "{" ] && PLATFORMS+=","
            PLATFORMS+="\"darwin-x86_64\":{\"signature\":\"$DMG_X64_SIG\",\"url\":\"$RELEASE_BASE/$DMG_X64_NAME\"}"
          fi
          if [ -n "$DMG_AARCH64" ]; then
            [ "$PLATFORMS" != "{" ] && PLATFORMS+=","
            PLATFORMS+="\"darwin-aarch64\":{\"signature\":\"$DMG_AARCH64_SIG\",\"url\":\"$RELEASE_BASE/$DMG_AARCH64_NAME\"}"
          fi
          if [ -n "$MSI" ]; then
            [ "$PLATFORMS" != "{" ] && PLATFORMS+=","
            PLATFORMS+="\"windows-x86_64\":{\"signature\":\"$MSI_SIG\",\"url\":\"$RELEASE_BASE/$MSI_NAME\"}"
          fi
          PLATFORMS+="}"

          cat > updater.json <<EOF
          {
            "version": "$VERSION",
            "notes": "$NOTES",
            "pub_date": "$PUB_DATE",
            "platforms": $PLATFORMS
          }
          EOF

          cat updater.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_ESC=$(echo "$VERSION" | sed 's/\./\\./g')
          CHANGELOG=$(sed -n "/^## \[${VERSION_ESC}\]/,/^## \[/{//!p}" CHANGELOG.md)
          gh release create $GITHUB_REF_NAME \
            --title "rsStoat $GITHUB_REF_NAME" \
            --notes "$CHANGELOG" \
            --repo hisoka-root/rsstoat \
            || true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload $GITHUB_REF_NAME \
            bundles/*.deb \
            bundles/*.dmg \
            bundles/*.msi \
            bundles/rsstoat-*.tar.gz \
            bundles/rsstoat-*.tar.gz.asc \
            updater.json \
            --repo hisoka-root/rsstoat \
            --clobber
